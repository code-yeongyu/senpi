commands:
  init: .factory/init.sh
  install: npm install
  build: npm run build
  check: npm run check
  test: cd packages/coding-agent && npx tsx ../../node_modules/vitest/dist/cli.js --run
  test-all: npm test --workspaces --if-present
  test-coding-agent: cd packages/coding-agent && npx tsx ../../node_modules/vitest/dist/cli.js --run
  test-coding-agent-file: cd packages/coding-agent && npx tsx ../../node_modules/vitest/dist/cli.js --run

services: {}
