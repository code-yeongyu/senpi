name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "build (${{ matrix.pm }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, bun, pnpm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ matrix.pm == 'npm' && 'npm' || '' }}

      - name: Setup pnpm
        if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup bun
        if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: |
          case "${{ matrix.pm }}" in
            npm) npm ci ;;
            bun) bun install ;;
            pnpm) pnpm install ;;
          esac

      - name: Build
        run: ${{ matrix.pm }} run build

      - name: Check
        if: matrix.pm == 'npm'
        run: npm run check

      - name: Test
        if: matrix.pm == 'npm'
        timeout-minutes: 50
        run: npm test
